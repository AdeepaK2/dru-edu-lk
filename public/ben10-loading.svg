<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ben10LoadingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#ben10LoadingGradient)"/>
  <circle cx="150" cy="150" r="80" fill="none" stroke="#84cc16" stroke-width="8" stroke-dasharray="20 10">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 150 150" to="360 150 150" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="150" r="60" fill="none" stroke="#4ade80" stroke-width="6" stroke-dasharray="15 8">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="360 150 150" to="0 150 150" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="150" y="180" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">LOADING...</text>
</svg>